<div class="dp-wrap">

  <!-- Trigger -->
  <div class="dp-trigger" (click)="toggle()">
    <span class="dp-trigger__value" [class.dp-trigger__value--empty]="!displayValue">
      {{ displayValue }}
    </span>
    <svg class="dp-trigger__icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
      <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
      <path d="M3 9h18M8 2v4M16 2v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Calendar popup -->
  <div class="dp-popup" *ngIf="isOpen" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="dp-header">
      <button type="button" class="dp-header__title">
        {{ headerLabel }}
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="dp-header__nav">
        <button type="button" class="dp-nav-btn" (click)="prevMonth()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button type="button" class="dp-nav-btn" (click)="nextMonth()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Day-of-week headers -->
    <div class="dp-grid">
      <div class="dp-day-hdr" *ngFor="let h of DAY_HEADERS">{{ h }}</div>
    </div>

    <!-- Calendar rows -->
    <ng-container *ngFor="let row of calendarRows; let rowIdx = index">
      <div class="dp-grid">
        <button
          type="button"
          *ngFor="let day of row; let colIdx = index"
          class="dp-day"
          [class.dp-day--today]="isToday(day)"
          [class.dp-day--selected]="isSelected(day)"
          [class.dp-day--empty]="!day"
          (click)="day && selectDay(day)"
        >
          <ng-container *ngIf="rowIdx === 0 && colIdx === 0 && !day; else dayNum">
            <span class="dp-month-abbrev">{{ shortMonthName }}</span>
          </ng-container>
          <ng-template #dayNum>{{ day || '' }}</ng-template>
        </button>
      </div>
    </ng-container>

  </div>
</div>
