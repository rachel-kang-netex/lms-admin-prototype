<div class="narrow-panel-overlay" *ngIf="open" (click)="onClose()"></div>

<div class="narrow-panel" [class.narrow-panel--open]="open">
  <!-- Header -->
  <div class="narrow-panel__header">
    <div class="narrow-panel__header-left">
      <button class="icon-btn icon-btn--close" (click)="onClose()" title="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="#3E3E3E" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="narrow-panel__title">{{ title }}</span>
    </div>
    <button class="btn btn--primary" [class.btn--disabled]="saveDisabled" [disabled]="saveDisabled" (click)="onSave()">{{ saveLabel }}</button>
  </div>

  <!-- Scrollable content -->
  <div class="narrow-panel__body">
    <ng-content></ng-content>
  </div>
</div>
