<div class="shell">
  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar__header">
      <span class="sidebar__title">learner Manager</span>
    </div>

    <nav class="sidebar__nav">
      <ng-container *ngFor="let item of navItems">

        <!-- Accordion (has children) -->
        <div *ngIf="item.children" class="nav-group">
          <button class="nav-group__trigger" (click)="toggle(item)">
            <span class="nav-group__icon">
              <ng-container [ngSwitch]="item.icon">
                <svg *ngSwitchCase="'contents'" width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                  <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
                <svg *ngSwitchCase="'trainings'" width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M3 9h18M8 2v4M16 2v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <svg *ngSwitchCase="'reports'" width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <path d="M18 20V10M12 20V4M6 20v-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <svg *ngSwitchCase="'settings'" width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.5"/>
                </svg>
              </ng-container>
            </span>
            <span class="nav-group__label">{{ item.label }}</span>
            <svg class="nav-group__chevron" [class.nav-group__chevron--open]="item.expanded"
              width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <div class="nav-group__children" *ngIf="item.expanded">
            <a
              *ngFor="let child of item.children"
              class="nav-child"
              [routerLink]="child.route"
              routerLinkActive="nav-child--active"
            >{{ child.label }}</a>
          </div>
        </div>

        <!-- Flat line item (no children) -->
        <a
          *ngIf="!item.children"
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="nav-item--active"
        >
          <span class="nav-item__icon">
            <ng-container [ngSwitch]="item.icon">
              <svg *ngSwitchCase="'users'" width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <svg *ngSwitchCase="'badges'" width="24" height="24" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="8" r="5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M12 13v8M9 18l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <svg *ngSwitchCase="'gamification'" width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              </svg>
            </ng-container>
          </span>
          <span class="nav-item__label">{{ item.label }}</span>
        </a>

      </ng-container>
    </nav>
  </aside>

  <!-- ── Main screen ── -->
  <main class="main-screen">
    <router-outlet></router-outlet>
  </main>
</div>
