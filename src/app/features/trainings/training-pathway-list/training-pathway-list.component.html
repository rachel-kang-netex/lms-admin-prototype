<div class="pathways-page">

  <!-- ── Page header ── -->
  <div class="page-header">
    <button class="hdr-btn" title="Menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M3 6h18M3 12h18M3 18h18" stroke="#3E3E3E" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="hdr-btn" title="User">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" stroke="#3E3E3E" stroke-width="1.5"/>
        <path d="M4 20c0-4 3.58-7 8-7s8 3 8 7" stroke="#3E3E3E" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- ── Tabs bar ── -->
  <div class="tabs-bar">
    <div class="tabs-bar__tabs">
      <button class="tab" [class.tab--active]="activeView === 'Default'" (click)="setView('Default')">Default</button>
      <button class="tab tab--closeable">
        Custom view
        <span class="tab__close">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
      </button>
      <button class="tab tab--closeable">
        Custom view
        <span class="tab__close">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
      </button>
    </div>
    <button class="btn-new-view">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M12 5v14M5 12h14" stroke="#2239C2" stroke-width="2" stroke-linecap="round"/>
      </svg>
      New view
    </button>
  </div>

  <!-- ── Table ── -->
  <div class="page-content">
    <app-data-table
      [columns]="columns"
      [data]="tableData"
      primaryAction="New training"
      searchPlaceholder="Search"
      [selectionActions]="[{label: 'Delete', action: 'delete'}]"
      (rowClick)="onRowClick($event)"
      (infoClick)="onInfoClick($event)"
    ></app-data-table>
  </div>

</div>
